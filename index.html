<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake 4.4 Neon Touch</title>
<style>
body { margin:0; overflow:hidden; background:#111; font-family:Arial,sans-serif; color:white; text-align:center; }
#container { display:flex; flex-direction:column; height:100vh; }
#gameArea { flex:2; position:relative; }
canvas { display:block; margin:auto; background:#f5f5dc; }
#controlArea { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; background:#222; }
button { padding:15px; font-size:22px; margin:5px; border:none; border-radius:8px; background:#0ff; color:#111; font-weight:bold; width:80%; }
button:hover { cursor:pointer; }
#message { position:absolute; width:100%; top:40%; font-size:40px; font-weight:bold; display:none; text-align:center; text-shadow:0 0 10px #0ff,0 0 20px #0ff; }
#highscore { font-size:24px; margin-bottom:10px; }
.controls { display:grid; grid-template-columns:80px 80px 80px; grid-template-rows:80px 80px 80px; gap:5px; justify-items:center; align-items:center; width:80%; }
</style>
</head>
<body>

<div id="container">
  <div id="gameArea">
    <canvas id="game"></canvas>
    <div id="message"></div>
  </div>
  <div id="controlArea">
    <p id="highscore">Highscore: 0</p>
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <div class="controls">
      <div></div><button id="upBtn">↑</button><div></div>
      <button id="leftBtn">←</button><button id="downBtn">↓</button><button id="rightBtn">→</button>
    </div>
  </div>
</div>

<audio id="bgmusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_95d8c9b9b6.mp3?filename=upbeat-instrumental-12709.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const startBtn=document.getElementById("startBtn");
const pauseBtn=document.getElementById("pauseBtn");
const message=document.getElementById("message");
const audio=document.getElementById("bgmusic");

const upBtn=document.getElementById("upBtn");
const downBtn=document.getElementById("downBtn");
const leftBtn=document.getElementById("leftBtn");
const rightBtn=document.getElementById("rightBtn");

const colors=["#39ff14","#00ffff","#ff00ff","#ff6347","#ffd700","#ff4500"];
let snake, dx, dy, score, speed, baseSpeed, gameInterval, food;
let highscore=localStorage.getItem("snakeHigh")||0;
document.getElementById("highscore").textContent="Highscore: "+highscore;

let grid=20;
let snowflakes=[], snowActive=false;
let paused=false;

function resizeCanvas(){
  canvas.width=document.getElementById("gameArea").clientWidth;
  canvas.height=document.getElementById("gameArea").clientHeight;
  grid=Math.floor(Math.min(canvas.width,canvas.height)/25);
}
window.addEventListener("resize",resizeCanvas);

function startGame(){
  resizeCanvas();
  snake=[{x:10,y:10}];
  dx=1; dy=0;
  score=0; baseSpeed=200; speed=baseSpeed;
  snowActive=false; snowflakes=[];
  spawnFood();
  clearInterval(gameInterval);
  gameInterval=setInterval(update,speed);
  audio.currentTime=0; audio.play().catch(()=>{});
  startBtn.disabled=true; pauseBtn.disabled=false;
  fadeInCanvas();
  paused=false;
}

function fadeInCanvas(){
  canvas.style.opacity=0;
  let alpha=0;
  const fade=setInterval(()=>{
    alpha+=0.05; canvas.style.opacity=alpha;
    if(alpha>=1) clearInterval(fade);
  },30);
  message.innerText="Ready!"; message.style.display="block";
  setTimeout(()=>{message.style.display="none"},1000);
}

function spawnFood(){ food={x:Math.floor(Math.random()*25),y:Math.floor(Math.random()*25)}; }

function setDirection(dir){
  if(dir==="up" && dy!==1){dx=0; dy=-1;}
  if(dir==="down" && dy!==-1){dx=0; dy=1;}
  if(dir==="left" && dx!==1){dx=-1; dy=0;}
  if(dir==="right" && dx!==-1){dx=1; dy=0;}
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") setDirection("up");
  if(e.key==="ArrowDown") setDirection("down");
  if(e.key==="ArrowLeft") setDirection("left");
  if(e.key==="ArrowRight") setDirection("right");
});

// Button Steuerung
upBtn.addEventListener("click",()=>setDirection("up"));
downBtn.addEventListener("click",()=>setDirection("down"));
leftBtn.addEventListener("click",()=>setDirection("left"));
rightBtn.addEventListener("click",()=>setDirection("right"));

// ---------------- Swipe-Steuerung ----------------
let touchStartX=0, touchStartY=0, touchEndX=0, touchEndY=0;
canvas.addEventListener("touchstart", e=>{ const t=e.touches[0]; touchStartX=t.clientX; touchStartY=t.clientY; });
canvas.addEventListener("touchend", e=>{
  const t=e.changedTouches[0]; touchEndX=t.clientX; touchEndY=t.clientY;
  const dxSwipe = touchEndX - touchStartX;
  const dySwipe = touchEndY - touchStartY;
  if(Math.abs(dxSwipe) > Math.abs(dySwipe)){
    if(dxSwipe > 20) setDirection("right");
    else if(dxSwipe < -20) setDirection("left");
  } else {
    if(dySwipe > 20) setDirection("down");
    else if(dySwipe < -20) setDirection("up");
  }
});

// Pause
pauseBtn.addEventListener("click",()=>{
  if(!paused){ clearInterval(gameInterval); paused=true; pauseBtn.textContent="Resume";}
  else { gameInterval=setInterval(update,speed); paused=false; pauseBtn.textContent="Pause";}
});

function update(){
  const head={x:snake[0].x+dx,y:snake[0].y+dy};
  if(head.x<0||head.y<0||head.x>=25||head.y>=25||snake.some(s=>s.x===head.x&&s.y===head.y)){ endGame(); return; }
  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){ score++; spawnFood(); handleEffects(); }
  else{ snake.pop(); }
  draw();
}

function handleEffects(){
  if(score<=20){ let factor=1-(score*0.05); speed=baseSpeed*factor; clearInterval(gameInterval); if(!paused) gameInterval=setInterval(update,speed); }
  if(score%3===0){ ctx.fillStyle=colors[Math.floor(score/3)%colors.length]; }
  if(score===5){ message.style.display="block"; message.style.color="gold"; message.innerText="toll nole"; setTimeout(()=>{message.style.display="none"},2000);}
  if(score>=6 && score%8===0){ 
    snowActive=true; snowflakes=[]; 
    for(let i=0;i<50;i++){ snowflakes.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*3+1, speed:Math.random()*2+1}); } 
    speed*=1.3; clearInterval(gameInterval); if(!paused) gameInterval=setInterval(update,speed); 
    setTimeout(()=>{snowActive=false; snowflakes=[];},7000);}
}

function drawSnow(){ 
  if(!snowActive) return; 
  ctx.fillStyle="white"; 
  snowflakes.forEach(f=>{ 
    ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2); 
    ctx.fill(); 
    f.y+=f.speed; 
    if(f.y>canvas.height) f.y=0; 
  }); 
}

function draw(){
  ctx.fillStyle="#f5f5dc";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawSnow();

  // Food mit Glow
  ctx.shadowColor="#0ff"; ctx.shadowBlur=15; ctx.fillStyle="#ff0";
  ctx.beginPath(); ctx.arc(food.x*grid+grid/2,food.y*grid+grid/2,grid/2,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;

  // Snake Neon
  snake.forEach((s,i)=>{ ctx.shadowColor=colors[i%colors.length]; ctx.shadowBlur=20; ctx.fillStyle=colors[i%colors.length]; ctx.fillRect(s.x*grid,s.y*grid,grid,grid); }); ctx.shadowBlur=0;
}

function endGame(){ 
  clearInterval(gameInterval); 
  message.style.display="block"; message.style.color="white"; message.innerText="Game Over"; 
  startBtn.disabled=false; pauseBtn.disabled=true; audio.pause();
  if(score>highscore){ localStorage.setItem("snakeHigh",score); document.getElementById("highscore").textContent="Highscore: "+score; }
}

startBtn.addEventListener("click",startGame);
pauseBtn.disabled=true;
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake 4.0 Neon</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:#111;
  font-family:Arial,sans-serif;
  color:white;
  text-align:center;
}
canvas{
  display:block;
  margin:auto;
}
button{
  padding:10px 20px;
  font-size:18px;
  margin:5px;
  animation: pulse 1.5s infinite;
  border:none;
  border-radius:8px;
  background:#0ff;
  color:#111;
  font-weight:bold;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 10px #0ff;}
  50%{box-shadow:0 0 25px #0ff;}
}
#message{
  position:absolute;
  width:100%;
  top:40%;
  font-size:40px;
  font-weight:bold;
  display:none;
  text-align:center;
  text-shadow:0 0 10px #0ff,0 0 20px #0ff;
}
.controls{
  display:grid;
  grid-template-columns:80px 80px 80px;
  gap:5px;
  justify-content:center;
  margin-top:10px;
}
</style>
</head>
<body>

<h1 style="text-shadow:0 0 10px #0ff,0 0 20px #0ff;">Snake 4.0 Neon</h1>
<p>Highscore: <span id="highscore">0</span></p>
<button id="startBtn">Start</button>
<canvas id="game"></canvas>
<div class="controls">
  <div></div>
  <button onclick="setDirection('up')">↑</button>
  <div></div>
  <button onclick="setDirection('left')">←</button>
  <button onclick="setDirection('down')">↓</button>
  <button onclick="setDirection('right')">→</button>
</div>
<div id="message"></div>

<audio id="bgmusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_95d8c9b9b6.mp3?filename=upbeat-instrumental-12709.mp3" type="audio/mpeg">
</audio>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const startBtn=document.getElementById("startBtn");
const message=document.getElementById("message");
const audio=document.getElementById("bgmusic");

const colors=["#39ff14","#00ffff","#ff00ff","#ff6347","#ffd700","#ff4500"];
let snake, dx, dy, score, speed, baseSpeed, gameInterval, food;
let highscore = localStorage.getItem("snakeHigh") || 0;
document.getElementById("highscore").textContent=highscore;

let grid=20;
let patternCanvas, patternCtx, pattern;
let snowflakes=[];
let snowActive=false;

function createPattern(){
  patternCanvas=document.createElement("canvas");
  patternCanvas.width=50;
  patternCanvas.height=50;
  patternCtx=patternCanvas.getContext("2d");
  patternCtx.fillStyle="#f5f5dc";
  patternCtx.fillRect(0,0,50,50);
  patternCtx.strokeStyle="#ddd";
  patternCtx.lineWidth=2;
  for(let i=0;i<50;i+=10){
    patternCtx.beginPath();
    patternCtx.moveTo(i,0);
    patternCtx.lineTo(i,50);
    patternCtx.stroke();
    patternCtx.beginPath();
    patternCtx.moveTo(0,i);
    patternCtx.lineTo(50,i);
    patternCtx.stroke();
  }
  pattern=ctx.createPattern(patternCanvas,"repeat");
}

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
  grid=Math.floor(Math.min(canvas.width,canvas.height)/25);
}

window.addEventListener("resize",resizeCanvas);

function startGame(){
  resizeCanvas();
  createPattern();
  startBtn.style.display="none";
  snake=[{x:10,y:10}];
  dx=1; dy=0;
  score=0;
  baseSpeed=200;
  speed=baseSpeed;
  snowActive=false;
  snowflakes=[];
  spawnFood();
  clearInterval(gameInterval);
  gameInterval=setInterval(update,speed);
  audio.currentTime=0;
  audio.play();
  fadeInCanvas();
}

function fadeInCanvas(){
  canvas.style.opacity=0;
  let alpha=0;
  const fade=setInterval(()=>{
    alpha+=0.05;
    canvas.style.opacity=alpha;
    if(alpha>=1) clearInterval(fade);
  },30);
  message.innerText="Ready!";
  message.style.display="block";
  setTimeout(()=>{message.style.display="none"},1000);
}

function spawnFood(){
  food={x:Math.floor(Math.random()*25),y:Math.floor(Math.random()*25)};
}

function setDirection(dir){
  if(dir==="up" && dy!==1){dx=0; dy=-1;}
  if(dir==="down" && dy!==-1){dx=0; dy=1;}
  if(dir==="left" && dx!==1){dx=-1; dy=0;}
  if(dir==="right" && dx!==-1){dx=1; dy=0;}
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") setDirection("up");
  if(e.key==="ArrowDown") setDirection("down");
  if(e.key==="ArrowLeft") setDirection("left");
  if(e.key==="ArrowRight") setDirection("right");
});

function update(){
  const head={x:snake[0].x+dx,y:snake[0].y+dy};

  if(head.x<0||head.y<0||head.x>=25||head.y>=25||snake.some(s=>s.x===head.x&&s.y===head.y)){
    endGame();
    return;
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    spawnFood();
    handleEffects();
  }else{
    snake.pop();
  }

  draw();
}

function handleEffects(){
  if(score<=20){
    let factor=1-(score*0.05);
    speed=baseSpeed*factor;
    clearInterval(gameInterval);
    gameInterval=setInterval(update,speed);
  }

  if(score%3===0){
    ctx.fillStyle=colors[Math.floor(score/3)%colors.length];
  }

  if(score===5){
    message.style.display="block";
    message.style.color="gold";
    message.innerText="toll nole";
    setTimeout(()=>{message.style.display="none"},2000);
  }

  if(score%8===0 && score!==0){
    snowActive=true;
    snowflakes=[];
    for(let i=0;i<50;i++){
      snowflakes.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*3+1, speed:Math.random()*2+1});
    }
    setTimeout(()=>{snowActive=false; snowflakes=[];},7000);
  }
}

function drawSnow(){
  if(!snowActive) return;
  ctx.fillStyle="white";
  snowflakes.forEach(f=>{
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
    ctx.fill();
    f.y += f.speed;
    if(f.y>canvas.height) f.y=0;
  });
}

function draw(){
  ctx.fillStyle=pattern;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Food mit Glow
  ctx.shadowColor="#0ff";
  ctx.shadowBlur=15;
  ctx.fillStyle="#ff0";
  ctx.beginPath();
  ctx.arc(food.x*grid+grid/2,food.y*grid+grid/2,grid/2,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  // Snake mit Neon Glow
  snake.forEach((s,i)=>{
    ctx.shadowColor=colors[i%colors.length];
    ctx.shadowBlur=20;
    ctx.fillStyle=colors[i%colors.length];
    ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
  });
  ctx.shadowBlur=0;

  // Neon-Rahmen
  ctx.strokeStyle="#0ff";
  ctx.lineWidth=5;
  ctx.strokeRect(0,0,canvas.width,canvas.height);

  drawSnow();
}

function endGame(){
  clearInterval(gameInterval);
  message.style.display="block";
  message.style.color="white";
  message.innerText="Game Over";
  startBtn.style.display="inline-block";
  audio.pause();

  if(score>highscore){
    localStorage.setItem("snakeHigh",score);
    document.getElementById("highscore").textContent=score;
  }
}

startBtn.addEventListener("click",startGame);
</script>
</body>
</html>

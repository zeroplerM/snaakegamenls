<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake 2.0</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
}
canvas{
  display:none;
  margin:auto;
  background:#000;
  border:3px solid #444;
}
button{
  padding:10px 20px;
  font-size:18px;
  margin:5px;
}
#message{
  position:absolute;
  width:100%;
  top:40%;
  font-size:40px;
  font-weight:bold;
  display:none;
}
.controls{
  display:grid;
  grid-template-columns:80px 80px 80px;
  gap:5px;
  justify-content:center;
  margin-top:10px;
}
</style>
</head>
<body>

<h1>Snake 2.0</h1>
<p>Highscore: <span id="highscore">0</span></p>
<button id="startBtn">Start</button>
<canvas id="game" width="400" height="400"></canvas>
<div class="controls">
  <div></div>
  <button onclick="setDirection('up')">↑</button>
  <div></div>
  <button onclick="setDirection('left')">←</button>
  <button onclick="setDirection('down')">↓</button>
  <button onclick="setDirection('right')">→</button>
</div>
<div id="message"></div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const startBtn=document.getElementById("startBtn");
const message=document.getElementById("message");

const grid=20;
const colors=["lime","cyan","orange","violet","red","yellow"];

let snake, dx, dy, score, speed, baseSpeed, gameInterval, food;
let highscore = localStorage.getItem("snakeHigh") || 0;
document.getElementById("highscore").textContent=highscore;

function startGame(){
  startBtn.style.display="none";
  canvas.style.display="block";
  snake=[{x:10,y:10}];
  dx=1; dy=0;
  score=0;
  baseSpeed=200;
  speed=baseSpeed;
  spawnFood();
  clearInterval(gameInterval);
  gameInterval=setInterval(update,speed);
}

function spawnFood(){
  food={x:Math.floor(Math.random()*25),y:Math.floor(Math.random()*25)};
}

function setDirection(dir){
  if(dir==="up" && dy!==1){dx=0; dy=-1;}
  if(dir==="down" && dy!==-1){dx=0; dy=1;}
  if(dir==="left" && dx!==1){dx=-1; dy=0;}
  if(dir==="right" && dx!==-1){dx=1; dy=0;}
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") setDirection("up");
  if(e.key==="ArrowDown") setDirection("down");
  if(e.key==="ArrowLeft") setDirection("left");
  if(e.key==="ArrowRight") setDirection("right");
});

function update(){
  const head={x:snake[0].x+dx,y:snake[0].y+dy};

  // Kollision Wand oder sich selbst
  if(head.x<0 || head.y<0 || head.x>=25 || head.y>=25 || snake.some(s=>s.x===head.x && s.y===head.y)){
    endGame();
    return;
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    spawnFood();
    handleEffects();
  }else{
    snake.pop();
  }

  draw();
}

function handleEffects(){
  // Geschwindigkeit erhöhen bis Score 20
  if(score<=20){
    let factor=1-(score*0.05);
    speed=baseSpeed*factor;
    clearInterval(gameInterval);
    gameInterval=setInterval(update,speed);
  }

  // Farbwechsel alle 3
  if(score%3===0){
    ctx.fillStyle=colors[Math.floor(score/3)%colors.length];
  }

  // Bei Score=5 -> "toll nole"
  if(score===5){
    message.style.display="block";
    message.style.color="gold";
    message.innerText="toll nole";
    setTimeout(()=>{message.style.display="none"},2000);
  }

  // Schneeeffekt alle 8 -> 7 Sekunden 80% langsamer
  if(score%8===0 && score!==0){
    let oldSpeed=speed;
    clearInterval(gameInterval);
    speed=oldSpeed*1.8;
    gameInterval=setInterval(update,speed);
    setTimeout(()=>{
      clearInterval(gameInterval);
      speed=oldSpeed;
      gameInterval=setInterval(update,speed);
    },7000);
  }
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Food
  ctx.fillStyle="red";
  ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

  // Snake
  snake.forEach(s=>{
    ctx.fillStyle="lime";
    ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
  });
}

function endGame(){
  clearInterval(gameInterval);
  message.style.display="block";
  message.style.color="white";
  message.innerText="Game Over";
  startBtn.style.display="inline-block";
  canvas.style.display="none";

  if(score>highscore){
    localStorage.setItem("snakeHigh",score);
    document.getElementById("highscore").textContent=score;
  }
}

startBtn.addEventListener("click",startGame);
</script>

</body>
</html>

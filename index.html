<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
}
canvas{
  background:#000;
  display:none;
  margin:auto;
  border:3px solid #444;
}
button{
  padding:10px 20px;
  font-size:18px;
  margin-top:20px;
}
#message{
  position:absolute;
  width:100%;
  top:40%;
  font-size:40px;
  font-weight:bold;
  display:none;
}
</style>
</head>
<body>

<h1>Snake</h1>
<p>Highscore: <span id="highscore">0</span></p>
<button id="startBtn">Start</button>
<canvas id="game" width="400" height="400"></canvas>
<div id="message"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const startBtn = document.getElementById("startBtn");
const message = document.getElementById("message");

const grid = 20;
let snake, food, dx, dy, score, speed, baseSpeed;
let gameInterval;
let highscore = localStorage.getItem("snakeHigh") || 0;
document.getElementById("highscore").textContent = highscore;

const colors = ["lime","cyan","orange","violet","red","yellow"];

function startGame(){
  startBtn.style.display="none";
  canvas.style.display="block";
  canvas.width=500;
  canvas.height=500;

  snake=[{x:10,y:10}];
  dx=1; dy=0;
  score=0;
  baseSpeed=200; // langsam starten
  speed=baseSpeed;
  spawnFood();
  clearInterval(gameInterval);
  gameInterval=setInterval(update, speed);
}

function spawnFood(){
  food={
    x:Math.floor(Math.random()*25),
    y:Math.floor(Math.random()*25)
  };
}

function update(){
  const head={x:snake[0].x+dx, y:snake[0].y+dy};

  if(head.x<0 || head.y<0 || head.x>=25 || head.y>=25 ||
     snake.some(s=>s.x===head.x && s.y===head.y)){
    endGame();
    return;
  }

  snake.unshift(head);

  if(head.x===food.x && head.y===food.y){
    score++;
    spawnFood();
    handleEffects();
  }else{
    snake.pop();
  }

  draw();
}

function handleEffects(){

  // Geschwindigkeit erhöhen bis max bei 20
  if(score<=20){
    let factor = 1 - (score*0.05);
    speed = baseSpeed * factor;
    clearInterval(gameInterval);
    gameInterval=setInterval(update, speed);
  }

  // Farbwechsel alle 3
  if(score%3===0){
    ctx.fillStyle = colors[(score/3)%colors.length];
  }

  // Bei 5 Blöcken "toll nole"
  if(score===5){
    message.style.display="block";
    message.style.color="gold";
    message.innerText="toll nole";
    setTimeout(()=>{message.style.display="none"},2000);
  }

  // Schneeeffekt alle 8
  if(score%8===0){
    let oldSpeed=speed;
    clearInterval(gameInterval);
    speed=oldSpeed*1.8; // 80% langsamer
    gameInterval=setInterval(update, speed);

    setTimeout(()=>{
      clearInterval(gameInterval);
      speed=oldSpeed;
      gameInterval=setInterval(update, speed);
    },7000);
  }
}

function draw(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="red";
  ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

  ctx.fillStyle="lime";
  snake.forEach(s=>{
    ctx.fillRect(s.x*grid,s.y*grid,grid,grid);
  });
}

function endGame(){
  clearInterval(gameInterval);
  message.style.display="block";
  message.style.color="white";
  message.innerText="Game Over";
  startBtn.style.display="inline-block";
  canvas.style.display="none";

  if(score>highscore){
    localStorage.setItem("snakeHigh",score);
    document.getElementById("highscore").textContent=score;
  }
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp" && dy!==1){dx=0;dy=-1;}
  if(e.key==="ArrowDown" && dy!==-1){dx=0;dy=1;}
  if(e.key==="ArrowLeft" && dx!==1){dx=-1;dy=0;}
  if(e.key==="ArrowRight" && dx!==-1){dx=1;dy=0;}
});

startBtn.addEventListener("click",startGame);
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOLE Snake</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#1e1e2f,#111);
font-family:Arial;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
color:white;
}

#topBar{
position:absolute;
top:10px;
right:10px;
z-index:10;
}

button{
padding:12px 20px;
margin-left:10px;
border:none;
border-radius:10px;
font-size:18px;
background:#00bcd4;
color:white;
}

#gameContainer{
height:66vh;
display:flex;
justify-content:center;
align-items:center;
}

canvas{
background:#222;
border-radius:20px;
box-shadow:0 0 30px rgba(0,255,255,0.4);
}

#controls{
height:34vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

#arrows{
display:grid;
grid-template-columns:repeat(3,120px);
grid-template-rows:repeat(2,120px);
gap:15px;
justify-content:center;
align-items:center;
}

.arrow{
background:#333;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:50px;
}

#message{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:10vw;
color:gold;
display:none;
text-shadow:0 0 20px gold;
}
</style>
</head>

<body>

<div id="topBar">
<button onclick="startGame()">Start</button>
<button onclick="pauseGame()">Pause</button>
</div>

<div id="message">SUPER NOLE</div>

<div id="gameContainer">
<canvas id="game"></canvas>
</div>

<div id="controls">
<div id="arrows">
<div></div>
<div class="arrow" onclick="changeDir('up')">↑</div>
<div></div>
<div class="arrow" onclick="changeDir('left')">←</div>
<div class="arrow" onclick="changeDir('down')">↓</div>
<div class="arrow" onclick="changeDir('right')">→</div>
</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let size;
let snake;
let dir;
let food;
let speed;
let baseSpeed=300; // 80% langsamer
let gameInterval;
let running=false;
let score=0;
let highscore=localStorage.getItem("noleHigh")||0;

function resize(){
canvas.width=window.innerWidth*0.9;
canvas.height=window.innerHeight*0.6;
size=Math.floor(canvas.width/25);
}
resize();
window.addEventListener("resize",resize);

function init(){
snake=[{x:10,y:10}];
dir="right";
food=randomFood();
speed=baseSpeed;
score=0;
updateSpeed();
draw();
}

function startGame(){
if(running) return;
running=true;
init();
startMusic();
loop();
}

function pauseGame(){
running=false;
clearTimeout(gameInterval);
}

function loop(){
if(!running) return;
update();
draw();
gameInterval=setTimeout(loop,speed);
}

function update(){
let head={...snake[0]};
if(dir==="up") head.y--;
if(dir==="down") head.y++;
if(dir==="left") head.x--;
if(dir==="right") head.x++;

if(head.x<0||head.y<0||head.x>24||head.y>24||
snake.some(s=>s.x===head.x&&s.y===head.y)){
gameOver();
return;
}

snake.unshift(head);

if(head.x===food.x&&head.y===food.y){
score++;
updateSpeed();
food=randomFood();
if(score%3===0) showMessage();
}else{
snake.pop();
}
}

function updateSpeed(){
speed=baseSpeed*Math.pow(0.9,score);
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

snake.forEach((s,i)=>{
ctx.fillStyle=`hsl(${(score*40)%360},100%,50%)`;
ctx.fillRect(s.x*size,s.y*size,size-2,size-2);
});

ctx.fillStyle="red";
ctx.fillRect(food.x*size,food.y*size,size-2,size-2);

ctx.fillStyle="white";
ctx.fillText("Score: "+score,10,20);
ctx.fillText("High: "+highscore,10,40);
}

function randomFood(){
return{
x:Math.floor(Math.random()*25),
y:Math.floor(Math.random()*25)
};
}

function changeDir(newDir){
if(!running) return;
dir=newDir;
}

function gameOver(){
running=false;
if(score>highscore){
highscore=score;
localStorage.setItem("noleHigh",highscore);
}
alert("Game Over");
}

function showMessage(){
const msg=document.getElementById("message");
msg.style.display="block";
setTimeout(()=>msg.style.display="none",3000);
}

/* SWIPE CONTROL */
let startX,startY;
canvas.addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
startY=e.touches[0].clientY;
});

canvas.addEventListener("touchend",e=>{
let dx=e.changedTouches[0].clientX-startX;
let dy=e.changedTouches[0].clientY-startY;
if(Math.abs(dx)>Math.abs(dy)){
if(dx>0) changeDir("right");
else changeDir("left");
}else{
if(dy>0) changeDir("down");
else changeDir("up");
}
});

/* MUSIC (WebAudio Beat Loop) */
let audioCtx;
function startMusic(){
if(audioCtx) return;
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
setInterval(()=>{
let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.frequency.value=200+Math.random()*400;
osc.type="triangle";
gain.gain.setValueAtTime(0.1,audioCtx.currentTime);
osc.start();
osc.stop(audioCtx.currentTime+0.2);
},400);
}
</script>

</body>
</html>

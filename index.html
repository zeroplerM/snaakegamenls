<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Nole Edition</title>

<style>
body{
    margin:0;
    background:#111;
    overflow:hidden;
    touch-action:none;
    font-family:Arial, sans-serif;
}

/* 2mm sichtbarer Rand */
#gameWrapper{
    width:96vw;
    height:64vh;
    margin:2mm auto;
    background:#333;
    border-radius:12px;
    padding:2px;
    box-sizing:border-box;
}

#gameArea{
    width:100%;
    height:100%;
    background:#000;
    position:relative;
    border-radius:10px;
    overflow:hidden;
}

#uiArea{
    width:100vw;
    height:34vh;
    background:#1a1a1a;
    display:flex;
    justify-content:center;
    align-items:center;
}

#controls{
    width:75%;
    height:70%;              /* etwas kleiner */
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    grid-template-rows:1fr 1fr 1fr;
    gap:10px;                /* weniger Abstand */
}

.btn{
    background:#333;
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;          /* ca. 10% kleiner */
    color:white;
    user-select:none;
}

#startPause{
    position:absolute;
    top:10px;
    right:10px;
    z-index:5;
}

.topBtn{
    background:#444;
    padding:8px 18px;
    border-radius:12px;
    color:white;
    margin-left:5px;
}

#overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:24px;
    z-index:4;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<div id="gameWrapper">
    <div id="gameArea">
        <div id="overlay">
            <h2>🐍 Snake Nole</h2>
            <div id="highscoreText"></div>
            <p>Drücke START</p>
        </div>

        <div id="startPause">
            <span class="topBtn" id="startBtn">Start</span>
            <span class="topBtn" id="pauseBtn">Pause</span>
        </div>

        <canvas id="game"></canvas>
    </div>
</div>

<div id="uiArea">
    <div id="controls">
        <div></div>
        <div class="btn" data-dir="up">⬆️</div>
        <div></div>
        <div class="btn" data-dir="left">⬅️</div>
        <div></div>
        <div class="btn" data-dir="right">➡️</div>
        <div></div>
        <div class="btn" data-dir="down">⬇️</div>
        <div></div>
    </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = document.getElementById("gameArea").clientWidth;
canvas.height = document.getElementById("gameArea").clientHeight;

let grid = 25;
let snake;
let direction;
let food;
let running = false;
let score = 0;
let highscore = localStorage.getItem("noleHigh") || 0;
let snowActive = false;
let snowParticles = [];
let hue = 0;

/* Startgeschwindigkeit = 10% der alten Basis */
let baseSpeed = 400;   // sehr langsam
let speed = baseSpeed;

document.getElementById("highscoreText").innerText="Highscore: "+highscore;

function initGame(){
    snake = [{x:10,y:10}];
    direction = "right";
    food = randomFood();
    score = 0;
    speed = baseSpeed;
    snowActive = false;
    snowParticles = [];
}

function randomFood(){
    return {
        x: Math.floor(Math.random()*(canvas.width/grid)),
        y: Math.floor(Math.random()*(canvas.height/grid))
    };
}

/* ===== Steuerung ===== */

document.querySelectorAll(".btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
        direction = btn.dataset.dir;
    });
});

let touchStartX=0;
let touchStartY=0;

canvas.addEventListener("touchstart",e=>{
    e.preventDefault();
    touchStartX=e.touches[0].clientX;
    touchStartY=e.touches[0].clientY;
},{passive:false});

canvas.addEventListener("touchmove",e=>{
    e.preventDefault();
},{passive:false});

canvas.addEventListener("touchend",e=>{
    let dx=e.changedTouches[0].clientX-touchStartX;
    let dy=e.changedTouches[0].clientY-touchStartY;
    if(Math.abs(dx)>Math.abs(dy)){
        direction = dx>0?"right":"left";
    } else {
        direction = dy>0?"down":"up";
    }
},{passive:false});

/* ===== Game Loop ===== */

function gameLoop(){
    if(!running) return;

    setTimeout(()=>{
        requestAnimationFrame(gameLoop);
        update();
        draw();
    },speed);
}

function update(){
    let head = {...snake[0]};

    if(direction==="right") head.x++;
    if(direction==="left") head.x--;
    if(direction==="up") head.y--;
    if(direction==="down") head.y++;

    if(head.x<0||head.y<0||
       head.x>canvas.width/grid||
       head.y>canvas.height/grid){
        gameOver();
        return;
    }

    snake.unshift(head);

    if(head.x===food.x && head.y===food.y){

        score++;

        /* Pro Stein 10% schneller */
        speed *= 0.85;

        food = randomFood();

        if(score>=6){
            snowActive = true;
            speed *= 1.3; // 30% langsamer bei Schnee
        }

    } else {
        snake.pop();
    }
}

function draw(){
    hue += 1;
    ctx.fillStyle="hsl("+hue+",50%,10%)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    snake.forEach(part=>{
        ctx.fillStyle="hsl("+hue+",80%,50%)";
        ctx.fillRect(part.x*grid,part.y*grid,grid-2,grid-2);
    });

    ctx.fillStyle="red";
    ctx.fillRect(food.x*grid,food.y*grid,grid-2,grid-2);

    if(snowActive) drawSnow();
}

function drawSnow(){
    if(snowParticles.length<60){
        snowParticles.push({x:Math.random()*canvas.width,y:0});
    }
    ctx.fillStyle="white";
    snowParticles.forEach(p=>{
        p.y+=20;
        ctx.fillRect(p.x,p.y,3,3);
    });
}

function gameOver(){
    running=false;
    document.getElementById("overlay").style.display="flex";

    if(score>highscore){
        highscore=score;
        localStorage.setItem("noleHigh",highscore);
    }

    document.getElementById("highscoreText").innerText="Highscore: "+highscore;
}

/* ===== Buttons ===== */

document.getElementById("startBtn").onclick=()=>{
    initGame();
    document.getElementById("overlay").style.display="none";
    running=true;
    gameLoop();
};

document.getElementById("pauseBtn").onclick=()=>{
    running=!running;
    if(running) gameLoop();
};
</script>

</body>
</html>

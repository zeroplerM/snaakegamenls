<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake 5.0</title>
<style>
body{
  margin:0;
  background:#111;
  font-family:Arial;
  overflow:hidden;
  color:white;
}

#container{
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* ---------------- SPIELFELD ---------------- */
#gameArea{
  flex:2;
  position:relative;
}

canvas{
  display:block;
  margin:auto;
  background:#111;
}

/* ---------------- STEUERBEREICH ---------------- */
#controlArea{
  flex:1;
  display:flex;
  background:#222;
  padding:10px;
  box-sizing:border-box;
}

/* LINKS: Pfeile */
#arrowArea{
  flex:2;
  display:flex;
  justify-content:center;
  align-items:center;
}

#arrows{
  display:grid;
  grid-template-columns:120px 120px 120px;
  grid-template-rows:120px 120px 120px;
  gap:10px;
}

/* Pfeile richtig groß */
.arrowBtn{
  font-size:40px;
  background:#00ffff;
  border:none;
  border-radius:15px;
  font-weight:bold;
}

/* RECHTS: Start / Pause */
#buttonArea{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

.controlBtn{
  width:120px;
  height:60px;
  font-size:20px;
  background:#ffcc00;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

#message{
  position:absolute;
  width:100%;
  top:40%;
  text-align:center;
  font-size:40px;
  font-weight:bold;
  display:none;
}

#highscore{
  position:absolute;
  top:10px;
  left:10px;
  font-size:22px;
}
</style>
</head>
<body>

<div id="container">

<div id="gameArea">
<canvas id="game"></canvas>
<div id="message"></div>
<div id="highscore"></div>
</div>

<div id="controlArea">

<div id="arrowArea">
<div id="arrows">
<div></div>
<button class="arrowBtn" id="up">↑</button>
<div></div>

<button class="arrowBtn" id="left">←</button>
<button class="arrowBtn" id="down">↓</button>
<button class="arrowBtn" id="right">→</button>
</div>
</div>

<div id="buttonArea">
<button class="controlBtn" id="start">Start</button>
<button class="controlBtn" id="pause">Pause</button>
</div>

</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const msg=document.getElementById("message");
const startBtn=document.getElementById("start");
const pauseBtn=document.getElementById("pause");
const highscoreEl=document.getElementById("highscore");

const up=document.getElementById("up");
const down=document.getElementById("down");
const left=document.getElementById("left");
const right=document.getElementById("right");

let gridCount=25;
let gridSize;
let snake=[];
let dx=0, dy=0;
let food;
let score=0;
let interval=null;
let speed=200;
let baseSpeed=200;
let gameRunning=false;
let paused=false;
let snow=false;
let snowflakes=[];

let highscore=localStorage.getItem("snakeHigh") || 0;
highscoreEl.innerText="Highscore: "+highscore;

function resize(){
canvas.width=canvas.parentElement.clientWidth;
canvas.height=canvas.parentElement.clientHeight;
gridSize=Math.floor(Math.min(canvas.width,canvas.height)/gridCount);
}
window.addEventListener("resize",resize);
resize();

/* ---------------- START ---------------- */
startBtn.onclick=()=>{
if(gameRunning) return;

snake=[{x:12,y:12}];
dx=1; dy=0;
score=0;
speed=baseSpeed;
snow=false;
snowflakes=[];
spawnFood();

interval=setInterval(update,speed);
gameRunning=true;
paused=false;
msg.style.display="none";
};

/* ---------------- PAUSE ---------------- */
pauseBtn.onclick=()=>{
if(!gameRunning) return;

if(!paused){
clearInterval(interval);
paused=true;
pauseBtn.innerText="Resume";
}else{
interval=setInterval(update,speed);
paused=false;
pauseBtn.innerText="Pause";
}
};

/* ---------------- STEUERUNG ---------------- */
function setDir(x,y){
if(!gameRunning) return;
if(dx===-x && dy===-y) return;
dx=x; dy=y;
}

up.onclick=()=>setDir(0,-1);
down.onclick=()=>setDir(0,1);
left.onclick=()=>setDir(-1,0);
right.onclick=()=>setDir(1,0);

/* ---------------- SPIEL ---------------- */
function spawnFood(){
food={
x:Math.floor(Math.random()*gridCount),
y:Math.floor(Math.random()*gridCount)
};
}

function update(){
let head={x:snake[0].x+dx,y:snake[0].y+dy};

if(head.x<0||head.y<0||head.x>=gridCount||head.y>=gridCount||
snake.some(s=>s.x===head.x&&s.y===head.y)){
endGame();
return;
}

snake.unshift(head);

if(head.x===food.x&&head.y===food.y){
score++;
spawnFood();
handleEffects();
}else{
snake.pop();
}

draw();
}

function handleEffects(){

// Speed steigern
if(score<=20){
speed=baseSpeed*(1-(score*0.04));
clearInterval(interval);
interval=setInterval(update,speed);
}

// 5 Punkte
if(score===5){
msg.innerText="toll nole";
msg.style.color="gold";
msg.style.display="block";
setTimeout(()=>msg.style.display="none",2000);
}

// Schnee ab 6
if(score>=6){
snow=true;
speed*=1.3;
clearInterval(interval);
interval=setInterval(update,speed);
}
}

function draw(){
ctx.fillStyle="#111";
ctx.fillRect(0,0,canvas.width,canvas.height);

// Schnee
if(snow){
ctx.fillStyle="white";
for(let i=0;i<40;i++){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height;
ctx.fillRect(x,y,2,2);
}
}

// Food
ctx.fillStyle="#ff0";
ctx.fillRect(food.x*gridSize,food.y*gridSize,gridSize,gridSize);

// Snake
ctx.fillStyle="#0ff";
snake.forEach(s=>{
ctx.fillRect(s.x*gridSize,s.y*gridSize,gridSize,gridSize);
});
}

function endGame(){
clearInterval(interval);
gameRunning=false;
msg.innerText="Game Over";
msg.style.color="white";
msg.style.display="block";

if(score>highscore){
localStorage.setItem("snakeHigh",score);
highscoreEl.innerText="Highscore: "+score;
}
}
</script>
</body>
</html>
